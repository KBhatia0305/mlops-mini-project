name: CI Pipeline

on: push 

jobs: 
  project-testing:
    runs-on: ubuntu-latest

    steps: 
      - name: code checkout
        uses: actions/checkout@v3 

      - name: steup python
        uses: actions/setup-python@v2
        with: 
          python-version: '3.14'

      - name: install dependencies
        run: |
          pip install -r requirements.txt 

      - name: run pipeline 
        run: |
          dvc repro 
   